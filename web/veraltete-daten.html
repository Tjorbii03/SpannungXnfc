<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Veraltete Daten - M5Stack Spannungsmesser</title>

    <!--
      Seite zeigt alle veralteten (älteren) Messwerte an.
      Backend-Endpunkt: /veraltete_data
      Anmerkung:
      - Diese Seite bekommt komplette Liste aus der "veralteten" DB.
      - IDs und Klassennamen nicht ändern, sonst bricht das JS.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .veraltete-table {
        margin-top: 20px;
        width: 100%;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        border-collapse: collapse;
      }

      .veraltete-table th,
      .veraltete-table td {
        padding: 12px;
        border: 1px solid #ccc;
        text-align: center;
      }

      .veraltete-table th {
        background: #005b9c;
        color: white;
      }

      .dark-mode .veraltete-table th {
        background: transparent;
      }

      .veraltete-table tr:nth-child(even) {
        background: #f9f9f9;
      }

      .dark-mode .veraltete-table tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
  </head>

  <body>
    <a href="#main" class="skip-link">Zum Inhalt springen</a>

    <header>
      <div class="header-content">
        <div class="menubalken" id="menubalken" aria-hidden="true"></div>
        <button
          id="menuButton"
          class="menu-button"
          aria-label="Navigation öffnen (Shortcut: M)"
          aria-expanded="false"
          aria-controls="mainNav"
          aria-describedby="menuHint"
          data-tooltip="Menü öffnen (Shortcut: M)"
        >
          <svg viewBox="0 0 100 80" aria-hidden="true">
            <rect width="100" height="10" rx="5"></rect>
            <rect y="30" width="100" height="10" rx="5"></rect>
            <rect y="60" width="100" height="10" rx="5"></rect>
          </svg>
        </button>
        <nav id="mainNav" aria-hidden="true">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="veraltete-daten.html">Veraltete Daten</a></li>
            <li><a href="stack-zuordnung.html">Stack Zuordnung</a></li>
            <li>
              <input
                type="checkbox"
                id="darkmode-toggle"
                class="darkmode-checkbox"
              />
              <label for="darkmode-toggle" class="darkmode-toggle"></label>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <div class="box">
        <h2>Veraltete Daten</h2>
        <div id="veraltete-content">
          <p>Lade veraltete Daten...</p>
        </div>
      </div>
    </main>

    <span id="menuHint" hidden>Shortcut: Taste M</span>
    <div aria-live="polite" class="sr-only" id="menuStatus" hidden></div>

    <script>
      // Holt alle veralteten Messwerte vom Server-Endpunkt /veraltete_data
      // Erwartetes Zeilenformat: "Value: <wert> | Timestamp: <zeit>"
      async function updateVeraltete() {
        try {
          const response = await fetch("/veraltete_data");
          const text = await response.text();

          // Sicherheits-Filter: leere Zeilen entfernen
          const lines = text
            .trim()
            .split("\n")
            .filter((line) => line.trim() !== "");

          // Tabelle aufbauen
          let html = `
                    <table class="veraltete-table">
                        <thead>
                            <tr>
                                <th>Value</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

          lines.forEach((line) => {
            const parts = line.split(" | ");
            if (parts.length === 2) {
              const value = parts[0].replace("Value: ", "").trim();
              const timestamp = parts[1].replace("Timestamp: ", "").trim();

              html += `
                            <tr>
                                <td>${value}</td>
                                <td>${timestamp}</td>
                            </tr>
                        `;
            }
          });

          html += `</tbody></table>`;
          document.getElementById("veraltete-content").innerHTML = html;
        } catch (e) {
          // Fehler für den Benutzer sichtbar machen
          document.getElementById("veraltete-content").innerHTML =
            "<p style='color:red;'>Fehler beim Laden der veralteten Daten</p>";
        }
      }

      // Polling alle 2 Sekunden
      setInterval(updateVeraltete, 2000);
      updateVeraltete();
    </script>

    <script src="js/main.js"></script>
  </body>
</html>
