<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <title>M5Stack Spannungsmesser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .live-table {
            margin: 20px auto;
            max-width: 700px;
            border-collapse: collapse;
        }

        .live-table th,
        .live-table td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        .live-table th {
            background: #005b9c;
            color: white;
        }

        .dark-mode .live-table th {
            background: transparent;
        }

        .live-table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .dark-mode .live-table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <a href="#main" class="skip-link">Zum Inhalt springen</a>

    <header>
        <div class="header-content">
            <div class="menubalken" id="menubalken" aria-hidden="true"></div>
            <button id="menuButton" class="menu-button" aria-label="Navigation öffnen (Shortcut: M)"
                aria-expanded="false" aria-controls="mainNav" aria-describedby="menuHint"
                data-tooltip="Menü öffnen (Shortcut: M)">
                <svg viewBox="0 0 100 80" aria-hidden="true">
                    <rect width="100" height="10" rx="5"></rect>
                    <rect y="30" width="100" height="10" rx="5"></rect>
                    <rect y="60" width="100" height="10" rx="5"></rect>
                </svg>
            </button>
            <nav id="mainNav" aria-hidden="true">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="veraltete-daten.html">Veraltete Daten</a></li>
                    <li><a href="stack-zuordnung.html">Stack Zuordnung</a></li>
                    <li>
                        <input type="checkbox" id="darkmode-toggle" class="darkmode-checkbox" />
                        <label for="darkmode-toggle" class="darkmode-toggle"></label>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main" tabindex="-1">
        <div class="box">
            <h2>Letzte 5 Messungen</h2>
            <div id="live-content">
                <p>Lade Messwerte...</p>
            </div>
        </div>
    </main>

    <span id="menuHint" hidden>Shortcut: Taste M</span>
    <div aria-live="polite" class="sr-only" id="menuStatus" hidden></div>

    <script>
        async function updateLiveData() {
            try {
                const response = await fetch("/all_data");   // Wir nutzen /all_data, da es jetzt die letzten 5 liefert
                const text = await response.text();
                const lines = text.trim().split('\n').filter(line => line.trim() !== '');

                let html = `
                    <table class="live-table">
                        <thead>
                            <tr>
                                <th>Werte</th>
                                <th>Zeitstempel</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                lines.forEach(line => {
                    const parts = line.split(' | ');
                    if (parts.length === 2) {
                        const value = parts[0].replace('Value: ', '').trim();
                        const timestamp = parts[1].replace('Timestamp: ', '').trim();
                        html += `
                            <tr>
                                <td><strong>${value}</strong></td>
                                <td>${timestamp}</td>
                            </tr>
                        `;
                    }
                });

                html += `</tbody></table>`;
                document.getElementById("live-content").innerHTML = html;

            } catch (e) {
                document.getElementById("live-content").innerHTML =
                    "<p style='color:red;'>Fehler beim Laden der Messwerte</p>";
            }
        }

        // Alle 2 Sekunden aktualisieren (schneller als bei den anderen Seiten)
        setInterval(updateLiveData, 2000);
        updateLiveData();
    </script>

    <script src="js/main.js"></script>
</body>

</html>
